name: bridge-tests

on:
  push:
    paths:
      - 'src/**'
      - 'resources/lang/**'
      - 'tests/**'
      - 'composer.json'
  pull_request:
    paths:
      - 'src/**'
      - 'resources/lang/**'
      - 'tests/**'
      - 'composer.json'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']
        laravel: ['12.*', '13.*']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Align Laravel version
        run: |
          composer require --no-interaction --no-update "illuminate/contracts:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}"
          composer update --no-interaction --prefer-dist

      - name: Run tests
        run: composer test
